name: Deploy laribrand

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd /var/www/LariBrand
            git fetch origin
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart laribrand
          command_timeout: 30m